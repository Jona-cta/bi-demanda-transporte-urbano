; ============================================================================
;  php.ini del PHP portatil del proyecto
;
;  Solo habilita lo que el modulo de IA necesita. No se instala nada en el
;  sistema: php.exe lee este archivo por estar en su misma carpeta.
; ============================================================================

extension_dir = "ext"

; SQLite: el extracto del Data Mart viaja como archivo .sqlite
extension=pdo_sqlite
extension=sqlite3

; HTTPS hacia la API de Gemini
extension=openssl
extension=curl

; Manejo correcto de acentos en los textos que devuelve el modelo
extension=mbstring

; Nota sobre certificados raiz: el bundle cacert.pem se incluye en esta misma
; carpeta, pero NO se configura aqui. php.ini solo admite rutas relativas al
; directorio de trabajo, que cambia segun desde donde se lance el servidor.
; La ruta absoluta se calcula en tiempo de ejecucion en ia/lib/gemini.php, para
; que el proyecto funcione desde cualquier ubicacion del disco.

; Zona horaria del Peru, para que las fechas y logs sean coherentes
date.timezone = "America/Lima"

; En la demo conviene ver el error real si algo falla, no una pagina en blanco.
display_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; El analisis con IA puede tardar; el cliente cURL ya tiene su propio limite de 60s.
max_execution_time = 120
memory_limit = 256M
